<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>County of Hawai'i | Environmental Management</title>

  <!--
    CSS load order:
      1. global.css      — tokens, reset, base body, shared utils
      2. header.css      — site header & nav
      3. hero.css        — hero slideshow
      4. quick-links.css — icon quick-link row
      5. calendar.css    — events tab, calendar grid, sidebar
      6. news.css        — news tab cards
      7. footer.css      — footer strip & footer nav
  -->
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/header.css" />
  <link rel="stylesheet" href="../assets/css/hero.css" />
  <link rel="stylesheet" href="../assets/css/quick-links.css" />
  <link rel="stylesheet" href="../assets/css/calendar.css" />
  <link rel="stylesheet" href="../assets/css/news.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
</head>
<body>

  <!-- ================================================================
       HEADER / NAV
  ================================================================ -->
  <header class="site-header">
    <div class="header-inner">

      <div class="logo">
        <div class="logo-seal">🌺</div>
        <div class="logo-text">
          <span class="county-label">COUNTY OF</span>
          <span class="county-name">HAWAI'I</span>
          <span class="dept-name">ENVIRONMENTAL<br>MANAGEMENT</span>
        </div>
      </div>

      <nav class="site-nav">
        <a href="#">SERVICES</a>
        <a href="#">PROJECTS</a>
        <a href="#">ABOUT</a>
        <a href="#">I WANT TO…</a>
        <button class="search-btn" aria-label="Search">&#128269;</button>
      </nav>

    </div>
  </header>

  <!-- ================================================================
       HERO SLIDESHOW
       Shell only — slides, arrows, dots, and captions are all
       injected at runtime by assets/js/slideshow.js (SLIDES_DATA).
  ================================================================ -->
  <section class="hero-slideshow" id="hero-slideshow"></section>

  <!-- ================================================================
       QUICK LINKS
  ================================================================ -->
  <section class="quick-links">

    <a href="#" class="quick-link">
      <div class="ql-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="10" width="28" height="20" rx="2" stroke="currentColor" stroke-width="2.2"/>
          <path d="M14 10V8M26 10V8M6 16h28" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="14" cy="23" r="2" fill="currentColor"/>
          <circle cx="20" cy="23" r="2" fill="currentColor"/>
          <circle cx="26" cy="23" r="2" fill="currentColor"/>
        </svg>
      </div>
      <span>FIND TRANSFER<br>STATIONS</span>
    </a>

    <a href="#" class="quick-link">
      <div class="ql-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 8c-3 4-8 6-8 12a8 8 0 0016 0c0-6-5-8-8-12z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M15 24s1 4 5 4 5-4 5-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 8v6M17 11l3-3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>RECYCLING<br>GUIDE</span>
    </a>

    <a href="#" class="quick-link">
      <div class="ql-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="16" width="30" height="14" rx="3" stroke="currentColor" stroke-width="2.2"/>
          <path d="M9 16v-3a3 3 0 016 0v3M25 16v-3a3 3 0 016 0v3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="14" cy="23" r="2" fill="currentColor"/>
          <circle cx="26" cy="23" r="2" fill="currentColor"/>
          <path d="M14 23h12" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
        </svg>
      </div>
      <span>ABANDONED<br>VEHICLES</span>
    </a>

    <a href="#" class="quick-link">
      <div class="ql-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 7l2.5 5 5.5.8-4 3.9.95 5.5L20 19.5l-4.95 2.7.95-5.5L12 12.8l5.5-.8L20 7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M14 26h12M16 30h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M20 22v4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span>CESSPOOLS IN<br>HAWAI'I</span>
    </a>

  </section>

  <!-- ================================================================
       MAIN CONTENT — Events & News tabs
  ================================================================ -->
  <main class="main-content">

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab active" id="tab-events" onclick="switchTab('events')">EVENTS</button>
      <button class="tab"        id="tab-news"   onclick="switchTab('news')">NEWS</button>
    </div>

    <!-- Events panel -->
    <section class="panel" id="panel-events">
      <div class="events-layout">

        <div class="calendar-card">
          <div class="calendar-header">
            <button class="cal-nav" id="prev-month" aria-label="Previous month">&#8249;</button>
            <h2 class="cal-title"   id="cal-title">MARCH 2026</h2>
            <button class="cal-nav" id="next-month" aria-label="Next month">&#8250;</button>
          </div>
          <div class="cal-grid">
            <div class="day-label">S</div>
            <div class="day-label">M</div>
            <div class="day-label">T</div>
            <div class="day-label">W</div>
            <div class="day-label">T</div>
            <div class="day-label">F</div>
            <div class="day-label">S</div>
            <div id="cal-days"></div><!-- populated by calendar.js -->
          </div>
        </div>

        <div class="event-sidebar">
          <div id="event-list"><!-- populated by calendar.js --></div>
          <button class="more-events-btn">MORE EVENTS</button>
        </div>

      </div>
    </section>

    <!-- News panel (hidden until tab click) -->
    <section class="panel hidden" id="panel-news">
      <div class="news-grid" id="news-grid"><!-- populated by news.js --></div>
    </section>

  </main>

  <!-- ================================================================
       FOOTER
  ================================================================ -->
  <div class="footer-strip">
    <div class="palm-silhouette"></div>
  </div>

  <footer class="site-footer">
    <a href="#">HOME</a>
    <a href="#">SERVICES</a>
    <a href="#">ABOUT</a>
    <a href="#">SITEMAP</a>
  </footer>

  <!-- ================================================================
       SCRIPTS
       Load order matters — data first, then modules, then main.
  ================================================================ -->
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/calendar.js"></script>
  <script src="../assets/js/news.js"></script>
  <script src="../assets/js/slideshow.js"></script>
  <script src="../assets/js/tabs.js"></script>
  <script src="../assets/js/main.js"></script>

</body>
</html>
