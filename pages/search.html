<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results | County of Hawai'i Environmental Management</title>

  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/header.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/search.css" />
</head>
<body>

  <header class="site-header">
    <div id="header-placeholder"></div>
  </header>

  <!-- ── SEARCH HERO ────────────────────────────────────── -->
  <section class="search-hero">
    <div class="search-hero-inner">
      <h1>Search Results</h1>
      <form class="search-hero-form" action="search.html" method="get" role="search">
        <input
          id="search-input"
          type="text"
          name="q"
          placeholder="Search programs, materials, locations…"
          aria-label="Search site"
          autocomplete="off"
        />
        <button type="submit" aria-label="Search">
          <span aria-hidden="true">🔍</span> Search
        </button>
      </form>
    </div>
  </section>

  <!-- ── RESULTS ────────────────────────────────────────── -->
  <main class="search-main">
    <div class="search-meta">
      <span id="search-count" class="sr-count"></span>
      <span id="search-query-display" class="sr-query"></span>
    </div>

    <div id="search-results" class="sr-list">
      <!-- populated by search.js -->
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/search-index.js"></script>
  <script src="../assets/js/search.js"></script>
  <script src="../assets/js/layout-loader.js"></script>

</body>
</html>
